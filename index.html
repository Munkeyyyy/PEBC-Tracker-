<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEBC MCQ 2026 — Study Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ===== VARIABLES ===== */
:root {
  --navy: #131E3A;
  --beige: #DDCDC2;
  --coral: #FF5454;
  --white: #FFFFFF;
  --green: #27ae60;
  --blue: #2980b9;
  --orange: #e67e22;
  --text: #131E3A;
  --text-dim: #8892a4;
  --text-mid: #4a5568;
  --border: #e8edf2;
  --bg: #f4f6f9;
  --sidebar-w: 250px;
  --radius: 10px;
}

/* ===== RESET ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== LAYOUT ===== */
.app { display: flex; min-height: 100vh; }

/* ===== SIDEBAR ===== */
.sidebar {
  width: var(--sidebar-w);
  background: var(--navy);
  color: var(--white);
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  transition: transform 0.25s ease;
}

.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

.sidebar-brand {
  padding: 22px 20px 4px;
  font-size: 15px;
  font-weight: 900;
}

.sidebar-sub {
  padding: 4px 20px 16px;
  font-size: 10px;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
  letter-spacing: 1px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  margin-bottom: 6px;
}

.sidebar-nav { padding: 8px 10px; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 700;
  color: rgba(255,255,255,0.6);
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 2px;
  user-select: none;
}

.nav-item:hover { background: rgba(255,255,255,0.08); color: var(--white); }
.nav-item.active { background: var(--coral); color: var(--white); }
.nav-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }

.sidebar-section-title {
  padding: 14px 20px 6px;
  font-size: 9px;
  font-weight: 800;
  color: rgba(255,255,255,0.3);
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

.sidebar-systems { padding: 0 10px 24px; flex: 1; }

.sys-group-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s;
  margin-bottom: 1px;
}

.sys-group-header:hover { background: rgba(255,255,255,0.07); }

.sys-group-name {
  font-size: 11px;
  font-weight: 700;
  color: rgba(255,255,255,0.6);
}

.sys-group-count {
  font-size: 10px;
  font-weight: 800;
  color: var(--coral);
}

.sys-group-topics { padding: 0 0 4px 18px; display: none; }
.sys-group.open .sys-group-topics { display: block; }

.sys-topic-link {
  display: block;
  padding: 3px 8px;
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.45);
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.1s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.sys-topic-link:hover { color: var(--white); background: rgba(255,255,255,0.05); }
.sys-topic-link.done { color: rgba(39,174,96,0.7); }

/* ===== MOBILE ===== */
.mobile-header {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 52px;
  background: var(--navy);
  z-index: 90;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
}

.mobile-header .hamburger {
  background: none; border: none; color: var(--white);
  font-size: 22px; cursor: pointer; padding: 4px;
}

.mobile-header .brand { font-size: 14px; font-weight: 800; color: var(--white); }

.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 99;
}

@media (max-width: 768px) {
  .mobile-header { display: flex; }
  .sidebar { transform: translateX(-100%); z-index: 101; }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.open { display: block; }
  .main { margin-left: 0 !important; padding-top: 64px !important; }
}

/* ===== MAIN ===== */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  padding: 24px 28px 56px;
  min-height: 100vh;
}

.view { display: none; }
.view.active { display: block; }

.view-title {
  font-size: 22px;
  font-weight: 900;
  color: var(--navy);
  margin-bottom: 20px;
}

/* ===== COUNTDOWN ===== */
.countdown-bar {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.countdown-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--navy);
  border-radius: 10px;
  padding: 10px 18px;
}

.countdown-num {
  font-size: 24px;
  font-weight: 900;
  color: var(--beige);
  line-height: 1;
}

.countdown-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.5);
  font-weight: 700;
}

.countdown-exam {
  font-size: 12px;
  color: var(--text-dim);
  font-weight: 700;
}

/* ===== CARDS ===== */
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 16px;
  overflow: hidden;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  cursor: pointer;
  user-select: none;
  transition: background 0.1s;
}

.card-header:hover { background: #fafbfc; }

.card-title {
  font-size: 13px;
  font-weight: 800;
  color: var(--navy);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.card-count {
  font-size: 11px;
  font-weight: 800;
  color: var(--white);
  background: var(--coral);
  border-radius: 10px;
  padding: 2px 8px;
  margin-left: 8px;
}

.card-chevron {
  font-size: 11px;
  color: var(--text-dim);
  transition: transform 0.2s;
}

.card.collapsed .card-chevron { transform: rotate(-90deg); }
.card.collapsed .card-body { display: none; }

.card-body {
  padding: 0 18px 16px;
}

/* ===== STAT ROWS ===== */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
}

.stat-box {
  background: var(--bg);
  border-radius: 8px;
  padding: 12px 14px;
}

.stat-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-dim);
  font-weight: 700;
  margin-bottom: 4px;
}

.stat-val {
  font-size: 20px;
  font-weight: 900;
  color: var(--navy);
  line-height: 1.1;
}

.stat-val.green { color: var(--green); }
.stat-val.blue { color: var(--blue); }
.stat-val.coral { color: var(--coral); }
.stat-val.orange { color: var(--orange); }

.stat-sub {
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 600;
  margin-top: 2px;
}

/* ===== PROGRESS BARS ===== */
.progress-row {
  margin-bottom: 14px;
}

.progress-row:last-child { margin-bottom: 0; }

.progress-info {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
  font-size: 12px;
  font-weight: 700;
}

.progress-info .label { color: var(--text-mid); }
.progress-info .pct { color: var(--navy); font-weight: 800; }

.progress-track {
  height: 10px;
  background: var(--bg);
  border-radius: 5px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.4s ease;
}

.progress-fill.blue { background: var(--blue); }
.progress-fill.orange { background: var(--orange); }
.progress-fill.green { background: var(--green); }

/* ===== DUE / UPCOMING LISTS ===== */
.due-list { list-style: none; }

.due-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 6px;
  margin-bottom: 4px;
  transition: background 0.1s;
}

.due-item:hover { background: var(--bg); }

.due-item.overdue {
  background: rgba(255,84,84,0.06);
  border-left: 3px solid var(--coral);
}

.due-topic {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.due-badge {
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 2px 8px;
  border-radius: 4px;
  flex-shrink: 0;
}

.badge-c2 { background: rgba(41,128,185,0.1); color: var(--blue); }
.badge-c3 { background: rgba(230,126,34,0.1); color: var(--orange); }
.badge-overdue { background: rgba(255,84,84,0.12); color: var(--coral); }

.due-date {
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 600;
  flex-shrink: 0;
}

.due-mark-btn {
  font-family: 'Nunito', sans-serif;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 5px;
  border: 1.5px solid var(--green);
  background: transparent;
  color: var(--green);
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.15s;
}

.due-mark-btn:hover { background: var(--green); color: var(--white); }

.empty-msg {
  font-size: 13px;
  color: var(--text-dim);
  font-weight: 600;
  padding: 8px 0;
  font-style: italic;
}

/* ===== LOG TOPICS VIEW ===== */
.search-wrap {
  position: relative;
  margin-bottom: 18px;
}

.search-input {
  width: 100%;
  max-width: 400px;
  padding: 10px 14px 10px 38px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  color: var(--text);
  background: var(--white);
  outline: none;
  transition: border-color 0.15s;
}

.search-input:focus { border-color: var(--coral); }

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 14px;
  pointer-events: none;
}

.log-system {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
}

.log-system-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  cursor: pointer;
  user-select: none;
  transition: background 0.1s;
}

.log-system-header:hover { background: #fafbfc; }

.log-system-name {
  font-size: 14px;
  font-weight: 800;
  color: var(--navy);
  flex: 1;
}

.log-system-progress {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-dim);
}

.log-system-chevron {
  font-size: 11px;
  color: var(--text-dim);
  transition: transform 0.2s;
}

.log-system.collapsed .log-system-chevron { transform: rotate(-90deg); }
.log-system.collapsed .log-system-body { display: none; }

.log-system-body { border-top: 1px solid var(--border); }

.log-topic-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}

.log-topic-row:last-child { border-bottom: none; }
.log-topic-row:hover { background: #fafbfc; }
.log-topic-row.search-hidden { display: none; }

.log-topic-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  flex: 1;
  min-width: 0;
}

.log-cycle-status {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.cycle-pill {
  font-size: 10px;
  font-weight: 800;
  padding: 3px 8px;
  border-radius: 4px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
}

.cycle-pill.done {
  background: rgba(39,174,96,0.1);
  color: var(--green);
}

.cycle-pill.due {
  background: rgba(230,126,34,0.1);
  color: var(--orange);
}

.cycle-pill.overdue {
  background: rgba(255,84,84,0.12);
  color: var(--coral);
  font-weight: 900;
}

.cycle-pill.pending {
  background: var(--bg);
  color: var(--text-dim);
}

.cycle-pill.not-started {
  background: transparent;
  color: var(--border);
}

/* ===== YIELD BADGES ===== */
.yield-tag {
  font-size: 9px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 1px 6px;
  border-radius: 3px;
  margin-left: 6px;
  vertical-align: middle;
  white-space: nowrap;
}

.yield-tag.high {
  background: rgba(255,84,84,0.1);
  color: var(--coral);
}

.yield-tag.low-med {
  background: rgba(230,190,34,0.13);
  color: #b8960f;
}

.yield-tag.low {
  background: rgba(137,142,164,0.1);
  color: var(--text-dim);
}

.td-yield-high { color: var(--coral); font-weight: 800; }
.td-yield-lowmed { color: #b8960f; font-weight: 700; }
.td-yield-low { color: var(--text-dim); }

.log-c1-btn {
  font-family: 'Nunito', sans-serif;
  font-size: 11px;
  font-weight: 800;
  padding: 5px 12px;
  border-radius: 6px;
  border: none;
  background: var(--coral);
  color: var(--white);
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}

.log-c1-btn:hover { opacity: 0.85; transform: scale(1.02); }

.log-done-btn {
  font-family: 'Nunito', sans-serif;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  border: 1.5px solid var(--green);
  background: transparent;
  color: var(--green);
  cursor: pointer;
  transition: all 0.15s;
}

.log-done-btn:hover { background: var(--green); color: var(--white); }

.log-undo-btn {
  font-family: 'Nunito', sans-serif;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
}

.log-undo-btn:hover { border-color: var(--coral); color: var(--coral); }

/* ===== DATE PICKER INLINE ===== */
.date-pick-group {
  display: inline-flex;
  align-items: center;
  gap: 0;
  flex-shrink: 0;
}

.date-pick-group .log-c1-btn {
  border-radius: 6px 0 0 6px;
}

.date-pick-toggle {
  font-family: 'Nunito', sans-serif;
  font-size: 11px;
  font-weight: 800;
  padding: 5px 7px;
  border-radius: 0 6px 6px 0;
  border: none;
  background: var(--navy);
  color: var(--white);
  cursor: pointer;
  transition: all 0.15s;
  line-height: 1;
}

.date-pick-toggle:hover { opacity: 0.85; }

.date-pick-wrap {
  display: none;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.date-pick-wrap.open { display: inline-flex; }

.date-pick-input {
  font-family: 'Nunito', sans-serif;
  font-size: 12px;
  font-weight: 700;
  padding: 4px 8px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  outline: none;
  width: 130px;
}

.date-pick-input:focus { border-color: var(--coral); }

.date-pick-confirm {
  font-family: 'Nunito', sans-serif;
  font-size: 10px;
  font-weight: 800;
  padding: 4px 10px;
  border-radius: 5px;
  border: none;
  background: var(--green);
  color: var(--white);
  cursor: pointer;
  transition: all 0.15s;
}

.date-pick-confirm:hover { opacity: 0.85; }

.date-pick-cancel {
  font-family: 'Nunito', sans-serif;
  font-size: 10px;
  font-weight: 700;
  padding: 4px 8px;
  border-radius: 5px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
}

.date-pick-cancel:hover { border-color: var(--coral); color: var(--coral); }

/* ===== ALL TOPICS TABLE ===== */
.table-controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 16px;
  align-items: center;
}

.table-controls .search-input { max-width: 240px; }

.table-controls select {
  font-family: 'Nunito', sans-serif;
  font-size: 12px;
  font-weight: 700;
  padding: 8px 12px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: var(--white);
  color: var(--text);
  outline: none;
  cursor: pointer;
}

.table-wrap {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow-x: auto;
}

.topics-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

.topics-table th {
  padding: 10px 14px;
  text-align: left;
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  background: #fafbfc;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
}

.topics-table th:hover { color: var(--navy); }
.topics-table th .sort-arrow { margin-left: 4px; font-size: 9px; }

.topics-table td {
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  white-space: nowrap;
}

.topics-table tr:last-child td { border-bottom: none; }
.topics-table tr:hover td { background: #fafbfc; }
.topics-table .table-hidden { display: none; }

.td-done { color: var(--green); }
.td-due { color: var(--orange); }
.td-overdue { color: var(--coral); font-weight: 800; }
.td-pending { color: var(--text-dim); }
.td-na { color: var(--border); }

/* ===== AUTOSAVE INDICATOR ===== */
.save-indicator {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--green);
  color: var(--white);
  font-size: 12px;
  font-weight: 700;
  padding: 8px 14px;
  border-radius: 8px;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 200;
  pointer-events: none;
}

.save-indicator.visible { opacity: 1; }

/* ===== LOADING ===== */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: #0f1b2d;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  flex-direction: column;
  gap: 16px;
}

.loading-overlay .text {
  color: #fff;
  font-size: 18px;
  font-weight: 700;
}

.spinner {
  width: 48px;
  height: 48px;
  border: 4px solid rgba(255,255,255,0.2);
  border-top-color: #ff5454;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ===== RESPONSIVE TWEAKS ===== */
@media (max-width: 768px) {
  .main { padding: 16px 14px 56px; }
  .view-title { font-size: 18px; }
  .stat-grid { grid-template-columns: 1fr 1fr; }
  .log-topic-row { flex-wrap: wrap; gap: 6px; }
  .log-cycle-status { width: 100%; justify-content: flex-start; }
  .table-controls { flex-direction: column; }
  .table-controls .search-input { max-width: 100%; }
}
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="text">Loading your tracker...</div>
  <div class="spinner"></div>
</div>

<!-- Mobile Header -->
<div class="mobile-header">
  <button class="hamburger" onclick="toggleMobileMenu()">&#9776;</button>
  <span class="brand">PEBC MCQ 2026</span>
</div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileMenu()"></div>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">PEBC MCQ 2026</div>
    <div class="sidebar-sub">Rohan &middot; Study Tracker</div>
    <nav class="sidebar-nav">
      <div class="nav-item active" data-view="dashboard" onclick="switchView('dashboard')">
        <span class="nav-icon">&#9632;</span> Dashboard
      </div>

  window._saveToFirestore = async function(stateObj) {

      console.warn("Firestore save failed, using localStorage fallback", e);

  };

      try {
        const raw = localStorage.getItem('pebc_tracker_v3') || localStorage.getItem('pebc_tracker_v2');
        if (raw) loadedState = JSON.parse(raw);
      } catch(_) {}
    }

    window.state = loadedState;
    document.dispatchEvent(new CustomEvent('firebaseReady'));
  }

  init();
</script>

function yieldTag(topic) {
  const y = TOPIC_YIELD[topic];
  if (!y) return '';
  return `<span class="yield-tag ${y}">${YIELD_LABELS[y]}</span>`;
}

const ALL_TOPICS = [];
const TOPIC_TO_SYSTEM = {};
Object.entries(SYSTEMS).forEach(([sys, topics]) => {
  topics.forEach(t => {
    ALL_TOPICS.push(t);
    TOPIC_TO_SYSTEM[t] = sys;
  });
});

const TOTAL = ALL_TOPICS.length;
const EXAM_DATE = '2026-05-19';
const C2_OFFSET = 3;
const C3_OFFSET = 10; // C1 + 10 = C2 + 7

// ===== STATE =====
let state = {};
let collapsedCards = {};
let collapsedSystems = {};
let sortCol = 'topic';
let sortDir = 'asc';

// ===== UTILITIES =====
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function addDays(dateStr, days) {
  const d = new Date(dateStr + 'T12:00:00');
  d.setDate(d.getDate() + days);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr + 'T12:00:00');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[d.getMonth()] + ' ' + d.getDate();
}

function daysUntilExam() {
  const today = new Date(todayStr() + 'T12:00:00');
  const exam = new Date(EXAM_DATE + 'T12:00:00');
  return Math.ceil((exam - today) / 86400000);
}

function daysBetween(a, b) {
  return Math.ceil((new Date(b+'T12:00:00') - new Date(a+'T12:00:00')) / 86400000);
}

// ===== STATE HELPERS =====
function getC1(t) { return state[t + '|c1'] || null; }
function getC2Done(t) { return state[t + '|c2'] || null; }
function getC3Done(t) { return state[t + '|c3'] || null; }
function getC2Due(t) { const c1 = getC1(t); return c1 ? addDays(c1, C2_OFFSET) : null; }
function getC3Due(t) { const c1 = getC1(t); return c1 ? addDays(c1, C3_OFFSET) : null; }

// ===== MIGRATION =====
window._migrateState = function(parsed) {
  const keys = Object.keys(parsed);
  if (keys.length === 0) return parsed;
  // Check if any value is boolean (old format)
  const hasBooleans = keys.some(k => typeof parsed[k] === 'boolean');
  if (!hasBooleans) return parsed;

  console.log('Migrating from boolean to date format...');
  const migrated = {};
  const today = todayStr();
  keys.forEach(k => {
    if (parsed[k] === true) {
      migrated[k] = today;
    }
  });
  return migrated;
};

// ===== ACTIONS =====
function logC1(topic, date) {
  state[topic + '|c1'] = date || todayStr();
  save();
  renderAll();
}

function markC2Done(topic, date) {
  state[topic + '|c2'] = date || todayStr();
  save();
  renderAll();
}

function markC3Done(topic, date) {
  state[topic + '|c3'] = date || todayStr();
  save();
  renderAll();
}

// Date picker helpers
function showDatePicker(topic, cycle) {
  // Hide any other open pickers
  document.querySelectorAll('.date-pick-wrap.open').forEach(el => el.classList.remove('open'));
  const id = 'dp-' + cycle + '-' + topic.replace(/[^a-zA-Z0-9]/g, '_');
  const el = document.getElementById(id);
  if (el) {
    el.classList.add('open');
    const input = el.querySelector('.date-pick-input');
    if (input) { input.value = todayStr(); input.focus(); }
  }
}

function confirmDatePick(topic, cycle) {
  const id = 'dp-' + cycle + '-' + topic.replace(/[^a-zA-Z0-9]/g, '_');
  const el = document.getElementById(id);
  if (!el) return;
  const input = el.querySelector('.date-pick-input');
  const date = input ? input.value : '';
  if (!date || !/^\d{4}-\d{2}-\d{2}$/.test(date)) return;
  if (cycle === 'c1') logC1(topic, date);
  else if (cycle === 'c2') markC2Done(topic, date);
  else if (cycle === 'c3') markC3Done(topic, date);
}

function cancelDatePick(topic, cycle) {
  const id = 'dp-' + cycle + '-' + topic.replace(/[^a-zA-Z0-9]/g, '_');
  const el = document.getElementById(id);
  if (el) el.classList.remove('open');
}

function undoTopic(topic) {
  delete state[topic + '|c1'];
  delete state[topic + '|c2'];
  delete state[topic + '|c3'];
  save();
  renderAll();
}

function save() {
  if (window._saveToFirestore) {
    window._saveToFirestore(state);
  } else {
    try { localStorage.setItem('pebc_tracker_v3', JSON.stringify(state)); } catch(_) {}
  }
  const ind = document.getElementById('saveIndicator');
  if (ind) {
    ind.classList.add('visible');
    clearTimeout(window._saveTimer);
    window._saveTimer = setTimeout(() => ind.classList.remove('visible'), 1200);
  }
}

// ===== COMPUTATIONS =====
function getPaceStats() {
  const today = todayStr();
  const d3ago = addDays(today, -3);
  const d7ago = addDays(today, -7);
  let c1Last3 = 0, c1Last7 = 0, totalC1 = 0;

  ALL_TOPICS.forEach(t => {
    const c1 = getC1(t);
    if (c1) {
      totalC1++;
      if (c1 >= d3ago) c1Last3++;
      if (c1 >= d7ago) c1Last7++;
    }
  });

  const avgPerDay = c1Last7 / 7;
  const remaining = TOTAL - totalC1;
  let estDate = null;
  if (avgPerDay > 0 && remaining > 0) {
    estDate = addDays(today, Math.ceil(remaining / avgPerDay));
  } else if (remaining === 0) {
    estDate = 'Done!';
  }

  return { c1Last3, c1Last7, avgPerDay: avgPerDay.toFixed(1), estDate, remaining, totalC1 };
}

function getDueToday() {
  const today = todayStr();
  const items = [];
  ALL_TOPICS.forEach(t => {
    const c2Due = getC2Due(t);
    if (c2Due && !getC2Done(t) && c2Due <= today) {
      items.push({ topic: t, cycle: 'c2', due: c2Due, overdue: c2Due < today });
    }
    const c3Due = getC3Due(t);
    if (c3Due && !getC3Done(t) && getC2Done(t) && c3Due <= today) {
      items.push({ topic: t, cycle: 'c3', due: c3Due, overdue: c3Due < today });
    }
    // Also show c3 due if c2 not done yet but c3 is overdue (edge case)
    if (c3Due && !getC3Done(t) && !getC2Done(t) && c3Due <= today) {
      // c2 not done, so c3 is also pending — don't show c3 until c2 done
    }
  });
  items.sort((a, b) => (b.overdue - a.overdue) || a.due.localeCompare(b.due));
  return items;
}

function getUpcoming(days) {
  const today = todayStr();
  const horizon = addDays(today, days);
  const items = [];
  ALL_TOPICS.forEach(t => {
    const c2Due = getC2Due(t);
    if (c2Due && !getC2Done(t) && c2Due > today && c2Due <= horizon) {
      items.push({ topic: t, cycle: 'c2', due: c2Due });
    }
    const c3Due = getC3Due(t);
    if (c3Due && !getC3Done(t) && getC2Done(t) && c3Due > today && c3Due <= horizon) {
      items.push({ topic: t, cycle: 'c3', due: c3Due });
    }
  });
  items.sort((a, b) => a.due.localeCompare(b.due));
  return items;
}

function getProgress() {
  let c1 = 0, c2 = 0, c3 = 0;
  ALL_TOPICS.forEach(t => {
    if (getC1(t)) c1++;
    if (getC2Done(t)) c2++;
    if (getC3Done(t)) c3++;
  });
  return {
    c1: { done: c1, pct: Math.round(c1 / TOTAL * 100) },
    c2: { done: c2, pct: Math.round(c2 / TOTAL * 100) },
    c3: { done: c3, pct: Math.round(c3 / TOTAL * 100) }
  };
}

        <div class="stat-val green">${pace.totalC1}</div>

  `);

  // Due Today
  const dueItems = getDueToday();
  let dueHTML = '';
  if (dueItems.length === 0) {
    dueHTML = '<div class="empty-msg">Nothing due today. Nice work!</div>';
  } else {
    dueHTML = '<ul class="due-list">' + dueItems.map(item => {
      const escapedTopic = item.topic.replace(/'/g, "\\'");
      const fn = item.cycle === 'c2' ? `markC2Done('${escapedTopic}')` : `markC3Done('${escapedTopic}')`;

        <span class="due-badge badge-${item.cycle}">${item.cycle.toUpperCase()}</span>

      </li>`;
    }).join('') + '</ul>';
  }
  renderCard('cardDueToday', 'Due Today' + (dueItems.length > 0 ? ` <span class="card-count">${dueItems.length}</span>` : ''), dueHTML);

  // Upcoming
  const upcoming = getUpcoming(3);
  let upHTML = '';
  if (upcoming.length === 0) {
    upHTML = '<div class="empty-msg">No reviews coming up in the next 3 days.</div>';
  } else {
    upHTML = '<ul class="due-list">' + upcoming.map(item => `
      <li class="due-item">
        <span class="due-badge badge-${item.cycle}">${item.cycle.toUpperCase()}</span>
        <span class="due-topic">${item.topic}</span>
        <span class="due-date">${formatDate(item.due)}</span>
      </li>
    `).join('') + '</ul>';
  }
  renderCard('cardUpcoming', 'Upcoming (3 Days)', upHTML);

  // Progress
  const prog = getProgress();
  renderCard('cardProgress', 'Progress', `
    <div class="progress-row">
      <div class="progress-info"><span class="label">C1 — Learn</span><span class="pct">${prog.c1.done}/${TOTAL} (${prog.c1.pct}%)</span></div>
      <div class="progress-track"><div class="progress-fill blue" style="width:${prog.c1.pct}%"></div></div>
    </div>
    <div class="progress-row">
      <div class="progress-info"><span class="label">C2 — Review</span><span class="pct">${prog.c2.done}/${TOTAL} (${prog.c2.pct}%)</span></div>
      <div class="progress-track"><div class="progress-fill orange" style="width:${prog.c2.pct}%"></div></div>
    </div>
    <div class="progress-row">
      <div class="progress-info"><span class="label">C3 — Rapid Refresh</span><span class="pct">${prog.c3.done}/${TOTAL} (${prog.c3.pct}%)</span></div>
      <div class="progress-track"><div class="progress-fill green" style="width:${prog.c3.pct}%"></div></div>
    </div>
  `);
}

function renderCard(id, titleHTML, bodyHTML) {
  const el = document.getElementById(id);
  const collapsed = collapsedCards[id] || false;
  el.innerHTML = `
    <div class="card ${collapsed ? 'collapsed' : ''}">
      <div class="card-header" onclick="toggleCard('${id}')">
        <div class="card-title">${titleHTML}</div>
        <span class="card-chevron">&#9660;</span>
      </div>
      <div class="card-body">${bodyHTML}</div>
    </div>
  `;
}

function toggleCard(id) {
  collapsedCards[id] = !collapsedCards[id];
  renderDashboard();
}

// ===== LOG TOPICS VIEW =====
function renderLogTopics() {
  const container = document.getElementById('logContainer');
  const today = todayStr();
  let html = '';

  Object.entries(SYSTEMS).forEach(([sys, topics]) => {
    const c1Count = topics.filter(t => getC1(t)).length;
    const collapsed = collapsedSystems[sys] === true;

    html += `<div class="log-system ${collapsed ? 'collapsed' : ''}" data-system="${sys}">
      <div class="log-system-header" onclick="toggleLogSystem('${sys.replace(/'/g, "\\'")}')">
        <div class="log-system-name">${sys}</div>
        <div class="log-system-progress">${c1Count}/${topics.length} C1</div>
        <span class="log-system-chevron">&#9660;</span>
      </div>
      <div class="log-system-body">`;

    topics.forEach(t => {
      const c1 = getC1(t);
      const c2Due = getC2Due(t);
      const c2Done = getC2Done(t);
      const c3Due = getC3Due(t);
      const c3Done = getC3Done(t);
      const escapedT = t.replace(/'/g, "\\'");

      let statusHTML = '';

      const dpId = (cycle, tp) => 'dp-' + cycle + '-' + tp.replace(/[^a-zA-Z0-9]/g, '_');
      const dpHTML = (cycle, tp) => {
        const esc = tp.replace(/'/g, "\\'");
        return `<div class="date-pick-wrap" id="${dpId(cycle, tp)}">
          <input type="date" class="date-pick-input" value="${todayStr()}" max="${todayStr()}">
          <button class="date-pick-confirm" onclick="event.stopPropagation();confirmDatePick('${esc}','${cycle}')">Save</button>
          <button class="date-pick-cancel" onclick="event.stopPropagation();cancelDatePick('${esc}','${cycle}')">&#10005;</button>
        </div>`;
      };

      if (!c1) {
        // Not started — split button: "Log C1" (today) + calendar icon (pick date)
        statusHTML = `<div class="date-pick-group">
          <button class="log-c1-btn" onclick="event.stopPropagation();logC1('${escapedT}')">Log C1</button>
          <button class="date-pick-toggle" onclick="event.stopPropagation();showDatePicker('${escapedT}','c1')" title="Log with past date">&#128197;</button>
        </div>`;
        statusHTML += dpHTML('c1', t);
      } else {
        // C1 done
        statusHTML += `<span class="cycle-pill done">C1 ${formatDate(c1)}</span>`;

        // C2 status
        if (c2Done) {
          statusHTML += `<span class="cycle-pill done">C2 ${formatDate(c2Done)}</span>`;
        } else if (c2Due && c2Due <= today) {
          const isOverdue = c2Due < today;
          statusHTML += `<span class="cycle-pill ${isOverdue ? 'overdue' : 'due'}">C2 ${isOverdue ? 'Overdue' : 'Due'}</span>`;
          statusHTML += `<button class="log-done-btn" onclick="event.stopPropagation();markC2Done('${escapedT}')">Done</button>`;
          statusHTML += `<button class="date-pick-toggle" style="border-radius:4px;padding:3px 6px;font-size:10px" onclick="event.stopPropagation();showDatePicker('${escapedT}','c2')" title="Log with past date">&#128197;</button>`;
          statusHTML += dpHTML('c2', t);
        } else if (c2Due) {
          statusHTML += `<span class="cycle-pill pending">C2 ${formatDate(c2Due)}</span>`;
        }

        // C3 status
        if (c3Done) {
          statusHTML += `<span class="cycle-pill done">C3 ${formatDate(c3Done)}</span>`;
        } else if (c2Done && c3Due && c3Due <= today) {
          const isOverdue = c3Due < today;
          statusHTML += `<span class="cycle-pill ${isOverdue ? 'overdue' : 'due'}">C3 ${isOverdue ? 'Overdue' : 'Due'}</span>`;
          statusHTML += `<button class="log-done-btn" onclick="event.stopPropagation();markC3Done('${escapedT}')">Done</button>`;
          statusHTML += `<button class="date-pick-toggle" style="border-radius:4px;padding:3px 6px;font-size:10px" onclick="event.stopPropagation();showDatePicker('${escapedT}','c3')" title="Log with past date">&#128197;</button>`;
          statusHTML += dpHTML('c3', t);
        } else if (c2Done && c3Due) {
          statusHTML += `<span class="cycle-pill pending">C3 ${formatDate(c3Due)}</span>`;
        } else if (!c2Done) {
          statusHTML += `<span class="cycle-pill not-started">C3 —</span>`;
        }

        statusHTML += ` <button class="log-undo-btn" onclick="event.stopPropagation();undoTopic('${escapedT}')" title="Reset topic">&#8634;</button>`;
      }

      html += `<div class="log-topic-row" data-topic="${t.toLowerCase()}">
        <div class="log-topic-name">${t}${yieldTag(t)}</div>
        <div class="log-cycle-status">${statusHTML}</div>
      </div>`;
    });

    html += `</div></div>`;
  });

  container.innerHTML = html;
}

function toggleLogSystem(sys) {
  collapsedSystems[sys] = !collapsedSystems[sys];
  const el = document.querySelector(`.log-system[data-system="${sys}"]`);
  if (el) el.classList.toggle('collapsed');
}

function filterLogTopics(query) {
  query = query.toLowerCase().trim();
  document.querySelectorAll('.log-topic-row').forEach(row => {
    const name = row.dataset.topic || '';
    row.classList.toggle('search-hidden', query && !name.includes(query));
  });
  // Show all systems when searching
  if (query) {
    document.querySelectorAll('.log-system.collapsed').forEach(s => s.classList.remove('collapsed'));
  }
}

// ===== ALL TOPICS TABLE =====
function renderAllTopicsTable() {
  const today = todayStr();
  const tbody = document.getElementById('allTableBody');

  // Populate system filter dropdown
  const sysSel = document.getElementById('allFilterSystem');
  if (sysSel.options.length <= 1) {
    Object.keys(SYSTEMS).forEach(sys => {
      const opt = document.createElement('option');
      opt.value = sys;
      opt.textContent = sys;
      sysSel.appendChild(opt);
    });
  }

  // Build sorted topic list
  let sorted = [...ALL_TOPICS];
  sorted.sort((a, b) => {
    let va, vb;
    switch (sortCol) {
      case 'topic': va = a; vb = b; break;
      case 'yield': { const yo = {'high':'0','low-med':'1','low':'2'}; va = yo[TOPIC_YIELD[a]] || '3'; vb = yo[TOPIC_YIELD[b]] || '3'; break; }
      case 'system': va = TOPIC_TO_SYSTEM[a]; vb = TOPIC_TO_SYSTEM[b]; break;
      case 'c1': va = getC1(a) || 'z'; vb = getC1(b) || 'z'; break;
      case 'c2due': va = getC2Due(a) || 'z'; vb = getC2Due(b) || 'z'; break;
      case 'c2done': va = getC2Done(a) || 'z'; vb = getC2Done(b) || 'z'; break;
      case 'c3due': va = getC3Due(a) || 'z'; vb = getC3Due(b) || 'z'; break;
      case 'c3done': va = getC3Done(a) || 'z'; vb = getC3Done(b) || 'z'; break;
      default: va = a; vb = b;
    }
    const cmp = String(va).localeCompare(String(vb));
    return sortDir === 'asc' ? cmp : -cmp;
  });

  let html = '';
  sorted.forEach(t => {
    const c1 = getC1(t);
    const c2Due = getC2Due(t);
    const c2Done = getC2Done(t);
    const c3Due = getC3Due(t);
    const c3Done = getC3Done(t);

    const c2Class = c2Done ? 'td-done' : (c2Due && c2Due < today ? 'td-overdue' : (c2Due && c2Due === today ? 'td-due' : (c2Due ? 'td-pending' : 'td-na')));
    const c3Class = c3Done ? 'td-done' : (c3Due && c3Due < today && c2Done ? 'td-overdue' : (c3Due && c3Due === today && c2Done ? 'td-due' : (c3Due ? 'td-pending' : 'td-na')));

    // Status for filtering
    let status = 'not-started';
    if (c3Done) status = 'c3-done';
    else if (c3Due && c3Due <= today && c2Done) status = 'c3-due';
    else if (c2Done) status = 'c2-done';
    else if (c2Due && c2Due <= today) status = 'c2-due';
    else if (c1) status = 'c1-done';

    const yld = TOPIC_YIELD[t] || '';
    const yldClass = yld === 'high' ? 'td-yield-high' : (yld === 'low-med' ? 'td-yield-lowmed' : (yld === 'low' ? 'td-yield-low' : 'td-na'));
    const yldLabel = yld ? YIELD_LABELS[yld] : '—';

    html += `<tr data-topic="${t.toLowerCase()}" data-system="${TOPIC_TO_SYSTEM[t]}" data-status="${status}" data-yield="${yld}">
      <td style="font-weight:700">${t}</td>
      <td class="${yldClass}">${yldLabel}</td>
      <td style="color:var(--text-dim)">${TOPIC_TO_SYSTEM[t]}</td>
      <td class="${c1 ? 'td-done' : 'td-na'}">${c1 ? formatDate(c1) : '—'}</td>
      <td class="${c2Due ? 'td-pending' : 'td-na'}">${c2Due ? formatDate(c2Due) : '—'}</td>
      <td class="${c2Class}">${c2Done ? formatDate(c2Done) : (c2Due && c2Due <= today ? (c2Due < today ? 'Overdue' : 'Due') : '—')}</td>
      <td class="${c3Due ? 'td-pending' : 'td-na'}">${c3Due ? formatDate(c3Due) : '—'}</td>
      <td class="${c3Class}">${c3Done ? formatDate(c3Done) : (c3Due && c3Due <= today && c2Done ? (c3Due < today ? 'Overdue' : 'Due') : '—')}</td>
    </tr>`;
  });

  tbody.innerHTML = html;

  // Update sort arrows
  document.querySelectorAll('.topics-table th').forEach(th => {
    const arrow = th.querySelector('.sort-arrow');
    if (th.dataset.col === sortCol) {
      arrow.textContent = sortDir === 'asc' ? ' ▲' : ' ▼';
    } else {
      arrow.textContent = '';
    }
  });

  filterAllTopics();
}

function sortAllTopics(col) {
  if (sortCol === col) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortCol = col;
    sortDir = 'asc';
  }
  renderAllTopicsTable();
}

function filterAllTopics() {
  const query = (document.getElementById('allSearch').value || '').toLowerCase().trim();
  const sys = document.getElementById('allFilterSystem').value;
  const yld = document.getElementById('allFilterYield').value;
  const status = document.getElementById('allFilterStatus').value;

  document.querySelectorAll('#allTableBody tr').forEach(row => {
    const matchQuery = !query || row.dataset.topic.includes(query);
    const matchSys = !sys || row.dataset.system === sys;
    const matchYield = !yld || row.dataset.yield === yld;
    const matchStatus = !status || row.dataset.status === status;
    row.classList.toggle('table-hidden', !(matchQuery && matchSys && matchYield && matchStatus));
  });
}

// ===== SIDEBAR =====
function renderSidebar() {
  const container = document.getElementById('sidebarSystems');
  let html = '';
  Object.entries(SYSTEMS).forEach(([sys, topics]) => {
    const c1Count = topics.filter(t => getC1(t)).length;
    const isOpen = collapsedSystems['sb_' + sys] === true;
    html += `<div class="sys-group ${isOpen ? 'open' : ''}">
      <div class="sys-group-header" onclick="toggleSidebarSystem('${sys.replace(/'/g, "\\'")}')">
        <span class="sys-group-name">${sys}</span>
        <span class="sys-group-count">${c1Count}/${topics.length}</span>
      </div>
      <div class="sys-group-topics">`;
    topics.forEach(t => {
      const done = !!getC1(t);
      html += `<div class="sys-topic-link ${done ? 'done' : ''}" onclick="jumpToTopic('${t.replace(/'/g, "\\'")}')">${t}</div>`;
    });
    html += `</div></div>`;
  });
  container.innerHTML = html;
}

function toggleSidebarSystem(sys) {
  collapsedSystems['sb_' + sys] = !collapsedSystems['sb_' + sys];
  const groups = document.querySelectorAll('.sys-group');
  groups.forEach(g => {
    const name = g.querySelector('.sys-group-name').textContent;
    if (name === sys) g.classList.toggle('open');
  });
}

function jumpToTopic(topic) {
  switchView('log');
  setTimeout(() => {
    const search = document.getElementById('logSearch');
    search.value = topic;
    filterLogTopics(topic);
    // Scroll to it
    const row = document.querySelector(`.log-topic-row[data-topic="${topic.toLowerCase()}"]`);
    if (row) row.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 50);
}

// ===== NAVIGATION =====
function switchView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.view === view);
  });
  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

function toggleMobileMenu() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}

// ===== INIT =====
document.addEventListener('firebaseReady', function() {
  document.getElementById('loadingOverlay').style.display = 'none';
  renderAll();
});
</script>
